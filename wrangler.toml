# Cloudflare Pages config for web-ar-instrument.
#
# This file is COMMITTED and contains NO SECRETS. The values below are placeholders;
# a deployer sets the real binding + variables in their own Cloudflare Pages project
# settings (dashboard) or a local untracked `.dev.vars` for `wrangler pages dev`.
# Secrets (the CI deploy API token) live in GitHub Actions secrets, never here.

name = "web-ar-instrument"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Bindings and environment variables are configured in the Pages PROJECT settings
# (dashboard → Settings → Variables and Bindings), NOT here — that keeps
# `wrangler pages deploy` working from a clean checkout and keeps per-deployment values
# out of the repo. A deployer configures, in the dashboard:
#   - R2 bucket bound as RECORDINGS            (the recordings + diagnostics store)
#   - CF_ACCESS_TEAM_DOMAIN, CF_ACCESS_AUD     (the Access app gating this deployment)
#   - ALLOWED_ORIGIN                           (this deployment's own origin; never *)
# See .env.example. For local `wrangler pages dev`, put these in an untracked .dev.vars.
