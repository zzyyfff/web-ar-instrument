<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>cv-stage9: independent per-tick fetches (no buffering)</title>
  <style>
    body { font: 14px monospace; background: #000; color: #fff; padding: 10px; line-height: 1.3; margin: 0; }
    #log { white-space: pre-wrap; word-break: break-word; font-size: 13px; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .tick { color: #fbbf24; }
    .hb { color: #93c5fd; }
    .raf { color: #c4b5fd; }
    .wk { color: #fdba74; }
    .vis { color: #f0abfc; }
    h2 { margin: 0 0 6px 0; font-size: 18px; }
    .sid { font-size: 14px; color: #fff; background: #1f2937; padding: 4px 8px; border-radius: 4px; margin-bottom: 8px; }
    #go { font: 16px monospace; padding: 14px 24px; background: #fb923c; color: #000; border: 0; border-radius: 12px; font-weight: bold; margin: 8px 0; }
    #verdict { padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 16px; font-weight: bold; text-align: center; }
    #verdict.pending { background: #1f2937; color: #fbbf24; }
    #verdict.ok { background: #064e3b; color: #4ade80; }
    #verdict.err { background: #7f1d1d; color: #fca5a5; }
    #wait-banner { padding: 14px; border-radius: 8px; margin: 8px 0; font-size: 20px; font-weight: bold; text-align: center; background: #1e3a8a; color: #fff; }
    #wait-banner.done { background: #064e3b; color: #4ade80; }
    #countdown { font-size: 28px; margin-top: 4px; }
  </style>
  <script type="module" src="/src/cv-stage9.ts"></script>
</head>
<body class="bg-black">
  <h2>cv-stage9: per-tick independent fetch</h2>
  <div class="sid">Session ID: <span id="sid"></span></div>
  <button id="go">Tap to begin</button>
  <div id="wait-banner" style="display:none">
    Keep this page open
    <div id="countdown">— s</div>
  </div>
  <div id="verdict" class="pending" style="display:none">Running tests…</div>
  <div id="log"></div>
</body>
</html>
