<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>cv-stage27: use cvLib.startCvPreload() instead of inline</title>
  <style>
    body { font: 14px monospace; background: #000; color: #fff; padding: 10px; line-height: 1.3; margin: 0; }
    #log { white-space: pre-wrap; word-break: break-word; font-size: 13px; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .tick { color: #fbbf24; }
    h2 { margin: 0 0 6px 0; font-size: 18px; }
    .sid { font-size: 14px; color: #fff; background: #1f2937; padding: 4px 8px; border-radius: 4px; margin-bottom: 8px; }
    #gate-diag { width: 100%; max-width: 600px; height: 200px; overflow-y: auto; background: rgba(0,0,0,0.85); border: 1px solid #444; border-radius: 6px; padding: 6px; margin: 8px 0; font: 12px monospace; color: #fbbf24; }
    #gate-diag div { padding: 1px 0; }
    #verdict { padding: 14px; border-radius: 8px; margin: 8px 0; font-size: 20px; font-weight: bold; text-align: center; }
    #verdict.pending { background: #1f2937; color: #fbbf24; }
    #verdict.ok { background: #064e3b; color: #4ade80; }
    #verdict.err { background: #7f1d1d; color: #fca5a5; }
  </style>
  <script type="module" src="/src/cv-stage27.ts"></script>
</head>
<body class="bg-black">
  <h2>cv-stage27: use cvLib.startCvPreload()</h2>
  <div class="sid">Session ID: <span id="sid"></span></div>
  <div id="verdict" class="pending">Calling cvLib.startCvPreload at module init…</div>
  <div id="gate-diag"></div>
  <div id="log"></div>
</body>
</html>
